<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Social - Artigo</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/artigos.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo" style="text-decoration:none;">BlogSocial</a>
            <button class="mobile-menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="artigos.html" class="active">Artigos</a></li>
                <li><a href="voluntario.html">Seja Voluntário</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article class="artigo-individual" id="artigoContainer">
            <div class="container" style="text-align:center;padding:4rem;">
                <p>⏳ Carregando artigo...</p>
            </div>
        </article>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Links Rápidos</h3>
                <ul class="footer-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="artigos.html">Artigos</a></li>
                    <li><a href="voluntario.html">Voluntário</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Contato</h3>
                <p>contato@blogsocial.com</p>
                <p>+55 (11) 1234-5678</p>
                <div class="footer-redes-sociais">
                    <a href="#" class="footer-rede-link" title="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
                    <a href="#" class="footer-rede-link" title="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5"/></svg></a>
                    <a href="#" class="footer-rede-link" title="Twitter"><svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
                    <a href="#" class="footer-rede-link" title="YouTube"><svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg></a>
                    <a href="#" class="footer-rede-link" title="LinkedIn"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Newsletter</h3>
                <form class="newsletter-form">
                    <input type="email" placeholder="Seu melhor e-mail" required>
                    <button type="submit">Inscrever</button>
                </form>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 BlogSocial. Todos os direitos reservados.</p>
        </div>
    </footer>


    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var urlParams = new URLSearchParams(window.location.search);
            var artigoId = urlParams.get('id');
            var container = document.getElementById('artigoContainer');

            if (!artigoId) {
                container.innerHTML = '<div class="container artigo-nao-encontrado"><h2>Nenhum artigo especificado</h2><p>Selecione um artigo da nossa lista.</p><a href="artigos.html" class="btn-voltar">← Ver Artigos</a></div>';
                return;
            }

            // Buscar artigo da API SQLite
            fetch('/api/artigos/' + artigoId)
                .then(function(r) { return r.json(); })
                .then(function(artigo) {
                    if (!artigo || artigo.erro) {
                        container.innerHTML = '<div class="container artigo-nao-encontrado"><h2>Artigo não encontrado</h2><p>O artigo não existe ou foi removido.</p><a href="artigos.html" class="btn-voltar">← Voltar</a></div>';
                        return;
                    }

                    document.title = artigo.titulo + ' - BlogSocial';

                    // Dados do autor vêm do JOIN no servidor
                    var autorNome = artigo.autor_nome || artigo.autor || 'Autor';
                    var autorFoto = artigo.autor_foto || artigo.autorFoto || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(autorNome) + '&size=150&background=6C5CE7&color=fff&bold=true';
                    var autorBio = artigo.autor_bio || artigo.autorBio || '';
                    var autorEspecialidade = artigo.autor_especialidade || artigo.autorEspecialidade || '';

                    // Fallback se vier vazio
                    if (!autorBio) autorBio = autorNome + ' é colaborador(a) do BlogSocial.';
                    if (!autorEspecialidade) autorEspecialidade = 'Colaborador BlogSocial';

                    var dataPub = artigo.dataPublicacao || artigo.data_publicacao || '';
                    var dataFormatada = new Date(dataPub + 'T12:00:00').toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' });

                    var palavras = artigo.palavrasChave || artigo.palavras || [];
                    if (typeof palavras === 'string') palavras = palavras.split(',');

                    var textoPuro = (artigo.conteudo || '').replace(/<[^>]*>/g, '');
                    var totalPalavras = textoPuro.split(' ').filter(function(p) { return p.length > 1; }).length;
                    var tempoLeitura = Math.max(1, Math.ceil(totalPalavras / 200));

                    container.innerHTML = '<div class="container">' +
                        '<header class="artigo-cabecalho">' +
                            '<h1>' + artigo.titulo + '</h1>' +
                            '<div class="artigo-detalhes">' +
                                '<span><span class="emoji">👤</span> Por <strong>' + autorNome + '</strong></span>' +
                                '<span><span class="emoji">📅</span> ' + dataFormatada + '</span>' +
                            '</div>' +
                            '<div class="palavras-chave">' + palavras.map(function(k) { return '<span class="keyword-tag">' + (typeof k === 'string' ? k.trim() : '') + '</span>'; }).join('') + '</div>' +
                        '</header>' +
                        '<div class="artigo-imagem-destaque">' +
                            '<img src="' + (artigo.imagem || 'https://via.placeholder.com/800x400') + '" alt="' + artigo.titulo + '" onerror="this.src=\'https://via.placeholder.com/800x400?text=Imagem+não+disponível\'">' +
                        '</div>' +
                        '<div class="artigo-texto">' + (artigo.conteudo || '') +
                            '<div class="artigo-autor-secao">' +
                                '<div class="autor-card">' +
                                    '<div class="autor-foto-wrapper">' +
                                        '<img src="' + autorFoto + '" alt="' + autorNome + '" class="autor-foto" onerror="this.src=\'https://ui-avatars.com/api/?name=' + encodeURIComponent(autorNome) + '&size=150&background=6C5CE7&color=fff&bold=true\'">' +
                                        '<div class="autor-status"></div>' +
                                    '</div>' +
                                    '<div class="autor-info">' +
                                        '<h3 class="autor-nome">' + autorNome + '</h3>' +
                                        '<span class="autor-especialidade">' + autorEspecialidade + '</span>' +
                                        '<p class="autor-bio">' + autorBio + '</p>' +
                                        '<div class="autor-redes">' +
                                            '<a href="#" class="autor-rede-link" title="Twitter">𝕏</a>' +
                                            '<a href="#" class="autor-rede-link" title="LinkedIn">in</a>' +
                                            '<a href="#" class="autor-rede-link" title="Website">🌐</a>' +
                                        '</div>' +
                                    '</div>' +
                                '</div>' +
                            '</div>' +
                            '<div class="artigo-metadados-secundarios">' +
                                '<div class="metadados-linha">' +
                                    '<div class="metadado-secundario"><span class="metadado-secundario-icone">📅</span><div><span class="metadado-secundario-label">Publicado em</span><span class="metadado-secundario-valor">' + dataFormatada + '</span></div></div>' +
                                    '<div class="metadado-secundario"><span class="metadado-secundario-icone">🕐</span><div><span class="metadado-secundario-label">Tempo de leitura</span><span class="metadado-secundario-valor">' + tempoLeitura + ' min</span></div></div>' +
                                '</div>' +
                                '<div class="palavras-chave metadados-chave"><span class="metadado-secundario-icone">🏷️</span>' + palavras.map(function(k) { return '<span class="keyword-tag">' + (typeof k === 'string' ? k.trim() : '') + '</span>'; }).join('') + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<a href="artigos.html" class="btn-voltar">← Voltar para Artigos</a>' +
                    '</div>';
                })
                .catch(function(error) {
                    console.error('❌ Erro:', error);
                    container.innerHTML = '<div class="container artigo-nao-encontrado"><h2>Erro ao carregar</h2><p>Verifique se o servidor está rodando na porta 3000.</p><a href="artigos.html" class="btn-voltar">← Voltar</a></div>';
                });
        });
    </script>
</body>
</html>
