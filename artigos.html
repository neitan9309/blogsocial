<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Social - Artigos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/artigos.css">
</head>
<body>
    <!-- Navegação -->
    <header>
        <nav>
            <a href="index.html" class="logo" style="text-decoration:none;">BlogSocial</a>
            <button class="mobile-menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="artigos.html" class="active">Artigos</a></li>
                <li><a href="voluntario.html">Seja Voluntário</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="artigos-page">
            <div class="container">
                <div class="artigos-header">
                    <h1>Todos os Artigos</h1>
                    <div class="filtros">
                        <input type="text" id="buscaArtigos" placeholder="🔍 Buscar por palavra-chave...">
                        <select id="artigosPorPagina">
                            <option value="3">3 por página</option>
                            <option value="6">6 por página</option>
                            <option value="9">9 por página</option>
                        </select>
                    </div>
                </div>

                <div class="artigos-grid" id="todosArtigos">
                    <p style="text-align:center;padding:2rem;">⏳ Carregando artigos...</p>
                </div>

                <div class="paginacao" id="paginacao"></div>
            </div>
        </section>
    </main>

    <!-- Rodapé -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Links Rápidos</h3>
                <ul class="footer-links">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="artigos.html">Artigos</a></li>
                    <li><a href="voluntario.html">Voluntário</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h3>Contato</h3>
                <p>contato@blogsocial.com</p>
                <p>+55 (11) 1234-5678</p>
                <div class="footer-redes-sociais">
                    <a href="#" class="footer-rede-link" title="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
                    <a href="#" class="footer-rede-link" title="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5"/></svg></a>
                    <a href="#" class="footer-rede-link" title="Twitter"><svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
                    <a href="#" class="footer-rede-link" title="YouTube"><svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29.94 29.94 0 0 0 1 12a29.94 29.94 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2A29.94 29.94 0 0 0 23 12a29.94 29.94 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"/></svg></a>
                    <a href="#" class="footer-rede-link" title="LinkedIn"><svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2zM4 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg></a>
                </div>
            </div>
            <div class="footer-section">
                <h3>Newsletter</h3>
                <form class="newsletter-form">
                    <input type="email" placeholder="Seu melhor e-mail" required>
                    <button type="submit">Inscrever</button>
                </form>
            </div>
        </div>

        </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        /**
         * Gerenciador da listagem de artigos com filtros e paginação
         */
        var ArtigosManager = function() {
            this.artigosPorPagina = 3;
            this.paginaAtual = 1;
            this.todosArtigos = [];
            this.artigosFiltrados = [];
            this.init();
        };

        ArtigosManager.prototype.init = function() {
            this.carregarArtigos();
            this.configurarFiltros();
        };

        ArtigosManager.prototype.carregarArtigos = function() {
            var self = this;
            var container = document.getElementById('todosArtigos');
            if (container) container.innerHTML = '<p style="text-align:center;padding:2rem;">⏳ Carregando artigos...</p>';

            API.getArtigos().then(function(artigos) {
                self.todosArtigos = Array.isArray(artigos) ? artigos : [];
                self.artigosFiltrados = [].concat(self.todosArtigos);
                console.log('📚 Artigos carregados da API:', self.todosArtigos.length);
                self.renderizarArtigos();
            }).catch(function(error) {
                console.error('❌ Erro ao carregar artigos:', error);
                if (container) container.innerHTML = '<p style="text-align:center;padding:2rem;">❌ Erro ao carregar artigos. Verifique se o servidor está rodando.</p>';
            });
        };

        ArtigosManager.prototype.configurarFiltros = function() {
            var self = this;
            var buscaInput = document.getElementById('buscaArtigos');
            var selectPagina = document.getElementById('artigosPorPagina');

            if (buscaInput) {
                buscaInput.addEventListener('input', function() {
                    var termo = this.value.toLowerCase();
                    if (termo) {
                        self.artigosFiltrados = self.todosArtigos.filter(function(artigo) {
                            var titulo = (artigo.titulo || '').toLowerCase();
                            var palavras = artigo.palavrasChave || artigo.palavras || [];
                            if (typeof palavras === 'string') palavras = palavras.split(',');
                            return titulo.indexOf(termo) !== -1 || palavras.some(function(k) {
                                return (typeof k === 'string' ? k : k.palavra || '').toLowerCase().indexOf(termo) !== -1;
                            });
                        });
                    } else {
                        self.artigosFiltrados = [].concat(self.todosArtigos);
                    }
                    self.paginaAtual = 1;
                    self.renderizarArtigos();
                });
            }

            if (selectPagina) {
                selectPagina.addEventListener('change', function() {
                    self.artigosPorPagina = parseInt(this.value);
                    self.paginaAtual = 1;
                    self.renderizarArtigos();
                });
            }
        };

        ArtigosManager.prototype.renderizarArtigos = function() {
            var container = document.getElementById('todosArtigos');
            if (!container) return;

            var inicio = (this.paginaAtual - 1) * this.artigosPorPagina;
            var fim = inicio + this.artigosPorPagina;
            var artigosPagina = this.artigosFiltrados.slice(inicio, fim);

            if (artigosPagina.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:2rem;">Nenhum artigo encontrado.</p>';
                document.getElementById('paginacao').innerHTML = '';
                return;
            }

            container.innerHTML = artigosPagina.map(function(a) {
                var palavras = a.palavrasChave || a.palavras || [];
                if (typeof palavras === 'string') palavras = palavras.split(',');
                var autorNome = a.autor_nome || a.autor || '';
                var dataPub = a.dataPublicacao || a.data_publicacao || '';

                return '<article class="artigo-card" onclick="window.location.href=\'artigo.html?id=' + a.id + '\'">' +
                    '<div class="artigo-imagem">' +
                        '<img src="' + (a.imagem || 'https://via.placeholder.com/400x200') + '" alt="' + a.titulo + '" loading="lazy" onerror="this.src=\'https://via.placeholder.com/400x200?text=Sem+imagem\'">' +
                    '</div>' +
                    '<div class="artigo-info">' +
                        '<h3>' + a.titulo + '</h3>' +
                        '<div class="palavras-chave">' +
                            palavras.map(function(k) {
                                return '<span class="keyword-tag">' + (typeof k === 'string' ? k : k.palavra || '') + '</span>';
                            }).join('') +
                        '</div>' +
                        '<div class="artigo-meta">' +
                            '<span>' + new Date(dataPub + 'T12:00:00').toLocaleDateString('pt-BR') + '</span>' +
                            '<span>' + autorNome + '</span>' +
                        '</div>' +
                    '</div>' +
                '</article>';
            }).join('');

            this.renderizarPaginacao();
        };

        ArtigosManager.prototype.renderizarPaginacao = function() {
            var container = document.getElementById('paginacao');
            var totalPaginas = Math.ceil(this.artigosFiltrados.length / this.artigosPorPagina);

            if (totalPaginas <= 1) {
                container.innerHTML = '';
                return;
            }

            var self = this;
            var html = '<div class="paginacao-botoes">';

            html += '<button class="pagina-btn" onclick="artigosManager.irParaPagina(' + (this.paginaAtual - 1) + ')" ' + (this.paginaAtual === 1 ? 'disabled' : '') + '>←</button>';

            for (var i = 1; i <= totalPaginas; i++) {
                html += '<button class="pagina-btn ' + (i === this.paginaAtual ? 'active' : '') + '" onclick="artigosManager.irParaPagina(' + i + ')">' + i + '</button>';
            }

            html += '<button class="pagina-btn" onclick="artigosManager.irParaPagina(' + (this.paginaAtual + 1) + ')" ' + (this.paginaAtual === totalPaginas ? 'disabled' : '') + '>→</button>';

            html += '</div>';
            container.innerHTML = html;
        };

        ArtigosManager.prototype.irParaPagina = function(pagina) {
            var totalPaginas = Math.ceil(this.artigosFiltrados.length / this.artigosPorPagina);
            if (pagina < 1 || pagina > totalPaginas) return;
            this.paginaAtual = pagina;
            this.renderizarArtigos();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Inicialização
        var artigosManager;
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 Inicializando página de artigos...');
            artigosManager = new ArtigosManager();
        });
    </script>
</body>
</html>
